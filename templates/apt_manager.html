<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아파트 DB 관리</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        /* [PC 기본 레이아웃 - ASP와 동일한 스타일 적용] */
        body { background:#f4f6f8; margin:0; padding:0; min-height: 100vh; overflow-x: hidden; overflow-y: auto; font-family: 'Noto Sans KR', sans-serif; }
        
        .main-container { 
            max-width: 1400px; margin: 0 auto; padding: 15px; 
            min-height: 100vh; box-sizing: border-box; 
            display: flex; flex-direction: column; 
        }
        
        .layout-wrap { display: flex; gap: 15px; flex-wrap: nowrap; align-items: stretch; min-height: calc(100vh - 140px); }
        
        .col-box { 
            background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;
            display: flex; flex-direction: column; transition: all 0.3s ease;
        }
        
        .col-1 { width: 300px; flex-shrink: 0; }
        .col-2 { width: 340px; flex-shrink: 0; }
        .col-3 { flex: 1; min-width: 500px; }
        
        .col-header { 
            background: #f8f9fa; padding: 12px; border-bottom: 1px solid #eee; 
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
        
        .col-body { padding: 10px; overflow-y: auto; flex: 1; min-height: 0; }
        
        /* [리스트 스타일] */
        .list-item { 
            padding: 10px; border-bottom: 1px solid #f1f1f1; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; transition: background 0.2s; position: relative;
        }
        .list-item > div:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }
        .list-item > div:first-child span {
            white-space: normal;
            word-break: break-word;
            line-height: 1.35;
        }
        .list-item:hover { background: #f8f9fa; }
        .list-item.active { background: #e3f2fd; color: #0d6efd; font-weight: bold; border-left: 4px solid #0d6efd; }
        
        .btn-mini-group { display: flex; gap: 5px; opacity: 0.5; transition: opacity 0.2s; flex-shrink: 0; }
        .list-item:hover .btn-mini-group { opacity: 1; }
        
        .drag-handle { color: #ccc; margin-right: 10px; padding: 5px; cursor: grab; font-size: 1.1em; }

        /* [입력 폼 스타일] */
        .input-area { padding:10px; border-bottom:1px solid #eee; background:#f9f9f9; }
        .split-inputs { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .split-inp { 
            width: 70px; text-align: center; padding: 8px; border: 1px solid #007bff;
            border-radius: 4px; font-weight: bold; background: #f0f8ff; font-size: 0.95rem;
        }
        .inp-mini { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: #fff; font-weight: bold; }
        .btn-info { background: #17a2b8; }
        .btn-save { background: #28a745; }
        .btn-back { background: #6c757d; }
        .btn-del { color: #dc3545; cursor: pointer; }
        .readonly-row { background: #fffdf3; }
        .readonly-row:hover { background: #fff9df; }
        .page-toolbar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .page-toolbar-title {
            margin: 0;
            color: #333;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .page-toolbar-meta {
            font-weight: bold;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .section-state-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            color: #57606a;
        }
        .section-state-badge.readonly {
            background: #fff3cd;
            border-color: #ffe69c;
            color: #8a5a00;
        }
        .section-state-badge.writable {
            background: #edf9f0;
            border-color: #bfe8c8;
            color: #1d6b36;
        }

        /* [테이블] */
        .win-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 10px; }
        .win-table th { background: #eee; padding: 10px; border-bottom: 2px solid #ddd; text-align: center; white-space: nowrap; }
        .win-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        .win-row:hover { background: #f9f9f9; }
        .win-row.editing { background: #fff3cd; }
        .win-cell-main { text-align: left !important; white-space: nowrap; }
        .win-main-line { display: flex; align-items: center; gap: 8px; min-width: 0; white-space: nowrap; }
        .win-type { font-weight: bold; color: #007bff; flex-shrink: 0; }
        .win-location { color: #444; flex-shrink: 0; }
        .win-split { white-space: nowrap; }
        .win-size { font-weight: bold; white-space: nowrap; }
        .win-action { width: 32px; white-space: nowrap; }

        .mobile-toggle-btn { display: none; }

        /* [모바일 최적화] */
        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            .main-container { max-width: 100%; width: 100%; height: auto; padding: 10px; display: block; }
            .layout-wrap { display: flex; flex-direction: column; height: auto; gap: 10px; }
            .col-box { width: 100% !important; flex: none; min-width: 0; max-height: none; height: auto; margin-bottom: 10px; }
            .col-body { max-height: 260px; overflow-y: auto; }
            .col-3 .col-body { max-height: none; overflow: auto; -webkit-overflow-scrolling: touch; }
            .col-header { padding: 14px 12px; font-size: 0.98rem; gap: 8px; }
            .input-area { padding: 12px; }
            .list-item { padding: 14px 12px; align-items: flex-start; }
            .list-item > div:first-child { align-items: flex-start; }
            .btn { min-height: 44px; padding: 10px 14px; }
            .inp-mini, .split-inp { min-height: 44px; font-size: 16px; }
            .btn-mini-group { opacity: 1; }
            .page-toolbar { flex-direction: column; align-items: flex-start; padding: 14px; }
            .page-toolbar-title { font-size: 1.15rem; }
            .page-toolbar-meta { width: 100%; justify-content: space-between; font-size: 0.95rem; }
            .page-toolbar-meta .btn-dash { width: 100%; min-height: 44px; margin-left: 0 !important; }
            .split-inputs { gap: 8px; }
            .win-table { min-width: 520px; font-size: 0.84rem; }
            .win-table,
            .win-table tbody,
            .win-table tr,
            .win-table td {
                display: revert;
                width: auto;
            }
            .win-table thead { display: none; }
            .win-table tbody { display: table-row-group; }
            .win-row { border: none; background: #fff; }
            .win-row td {
                text-align: left !important;
                padding: 9px 6px;
                border-bottom: 1px solid #f1f3f5;
                vertical-align: middle;
            }
            .win-row td:first-child { display: table-cell; width: 24px; }
            .win-row td.win-action { width: 24px; text-align: center !important; }
            .win-main-line {
                display: flex;
                align-items: center;
                gap: 8px;
                white-space: nowrap;
            }
            .win-type { font-size: 0.92rem; }
            .win-location {
                white-space: nowrap;
                font-size: 0.9rem;
            }
            .win-split, .win-size { font-size: 0.88rem; }
            .mobile-toggle-btn { display: block; font-size: 1.2rem; color: #666; cursor: pointer; padding: 5px; }
            .collapsed .col-body, .collapsed .input-area { display: none; }
            .collapsed .col-header { border-bottom: none; background: #fff; color: #888; }
            .collapsed { border: 1px dashed #ddd; }
        }
    </style>
</head>
<body>
    {% include "includes/top_nav.html" %}
    
    <div class="main-container">
        <div class="page-toolbar">
        <h2 class="page-toolbar-title">
            <i class="fas fa-building" style="color: #4361ee; margin-right: 8px;"></i>
            {{ company_name }} 아파트 관리
        </h2>
        <div class="page-toolbar-meta">
            <i class="fas fa-user-circle"></i> {{ user_name }}님
        </div>
    </div>

        <div id="aptModeBanner" style="margin-bottom:12px; display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; background:#eef4ff; border:1px solid #cfe0ff; color:#1f4f99; font-size:0.92rem;">
            <i class="fas fa-circle-info"></i>
            <span>자사 단지는 수정할 수 있고, 공유 단지는 조회만 가능합니다.</span>
        </div>

        <div class="layout-wrap">
            
            <div class="col-box col-1" id="boxComplex">
                <div class="col-header" onclick="toggleSection('boxComplex')">
                    <span>1. 단지 선택</span>
                    <i class="fas fa-chevron-down mobile-toggle-btn"></i>
                </div>
                <div class="input-area">
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="newComplexName" class="inp-mini" placeholder="새 단지명" style="flex:1;">
                        <button onclick="saveComplex()" class="btn btn-save" style="width:40px;">+</button>
                    </div>
                </div>
                <div class="col-body" id="listComplex">
                    <div style="padding:20px; text-align:center; color:#999;">로딩 중...</div>
                </div>
            </div>

            <div class="col-box col-2" id="boxPlan">
                <div class="col-header" onclick="toggleSection('boxPlan')">
                    <span id="planTitle">2. 평형/타입</span>
                    <span id="planStateBadge" class="section-state-badge" style="margin-left:auto;">선택 대기</span>
                    <i class="fas fa-chevron-down mobile-toggle-btn"></i>
                </div>
                <div class="input-area" id="planInputWrap" style="display:none;">
                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="text" id="newPlanName" class="inp-mini" placeholder="예: 84A" style="flex:1;">
                        <button onclick="savePlan()" class="btn btn-info" style="width:40px;">+</button>
                    </div>
                </div>
                <div class="col-body" id="listPlan">
                    <div style="padding:20px; text-align:center; color:#999;">단지를 선택해주세요.</div>
                </div>
            </div>

            <div class="col-box col-3">
                <div class="col-header" style="background:#e3f2fd; color:#0d47a1;">
                    <span id="winTitle">3. 창문 실측 데이터 (cm)</span>
                    <span id="winStateBadge" class="section-state-badge" style="margin-left:auto;">선택 대기</span>
                </div>
                
                <div id="winFormWrap" style="padding:15px; border-bottom:2px solid #0d47a1; background:#fff; display:none;">
                    <input type="hidden" id="inpWid" value=""> <div style="display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap;">
                        <div style="position:relative; flex:2; min-width:120px;">
                            <input type="text" id="LocationName" class="inp-mini" placeholder="위치 (직접입력 가능)" style="width:100%; box-sizing:border-box;" required>
                            <select onchange="document.getElementById('LocationName').value=this.value; this.value='';" style="position:absolute; right:0; top:0; height:100%; width:30px; opacity:0; cursor:pointer;">
                                <option value="">선택도우미</option>
                                <option value="거실">거실</option><option value="안방">안방</option>
                                <option value="작은방1">작은방1</option><option value="작은방2">작은방2</option>
                                <option value="주방">주방</option><option value="알파룸">알파룸</option><option value="드레스룸">드레스룸</option>
                                <option value="거실(베)">거실(베)</option><option value="안방(베)">안방(베)</option>
                            </select>
                        </div>
                        <select id="WinType" class="inp-mini" style="flex:1; min-width:80px;" onchange="changeInputMode()">
                            <option value="블라인드">블라인드</option>
                            <option value="커튼">커튼</option>
                        </select>
                        <select id="SplitCount" class="inp-mini" style="flex:0.8; min-width:60px;" onchange="renderSplitInputs()">
                            <option value="1">1창</option><option value="2">2창</option><option value="3">3창</option><option value="4">4창</option>
                        </select>
                    </div>

                    <div style="background:#f1f3f5; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #e9ecef;">
                        <div style="display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap;">
                            <div style="flex:1;">
                                <div style="font-size:0.8rem; color:#666; margin-bottom:4px; text-align:center;">가로(W) 분할입력</div>
                                <div id="dynamicInputs" class="split-inputs" style="justify-content:left;"></div>
                            </div>
                            <div style="display:flex; align-items:center; height:50px; color:#aaa; font-weight:bold;">x</div>
                            <div style="width:80px;">
                                <div style="font-size:0.8rem; color:#666; margin-bottom:4px; text-align:center;">세로(H)</div>
                                <input type="number" step="0.1" id="Height" class="split-inp" style="background:#fff; width:100%; box-sizing:border-box;" placeholder="H">
                            </div>
                        </div>
                    </div>

                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="text" id="Memo" class="inp-mini" placeholder="특이사항 / 박스사이즈 등" style="flex:1;">
                    </div>

                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <button type="button" id="btnReset" class="btn btn-back" style="display:none; flex:1;" onclick="resetForm()">취소</button>
                        <button type="button" id="btnSave" class="btn btn-save" style="flex:2;" onclick="saveWindow()">저장하기</button>
                    </div>
                </div>

                <div class="col-body">
                    <table class="win-table">
                         <colgroup><col width="30"><col width="*"><col width="20%"><col width="20%"><col width="30"></colgroup>
                        <thead><tr><th></th><th>위치/타입</th><th>분할상세</th><th>총사이즈</th><th></th></tr></thead>
                        <tbody id="listWindow">
                            <tr><td colspan="5" style="padding:30px; color:#999;">평형을 먼저 선택하세요.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 상태 변수
        let curComplexId = null;
        let curPlanId = null;

        document.addEventListener("DOMContentLoaded", function() {
            document.addEventListener('focusin', function(e) {
                const el = e.target;
                if (!el) return;
                if (el.matches('input[type="text"], input[type="number"], textarea')) {
                    if (el.readOnly || el.disabled) return;
                    setTimeout(function() {
                        if (document.activeElement === el && typeof el.select === 'function') {
                            el.select();
                        }
                    }, 0);
                }
            });

            // 초기 단지 목록 로드
            loadComplexes();

            // 드래그 정렬 초기화 (필요 시 API 연동)
            initSortable("listComplex", "complex");
            initSortable("listPlan", "plan");
            initSortable("listWindow", "window");

            // 초기 입력 모드 설정
            changeInputMode();

            // 모바일 초기화
            if(window.innerWidth <= 768) {
                document.getElementById('boxPlan').classList.add('collapsed');
            }
        });

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeJsString(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/\r/g, "\\r")
                .replace(/\n/g, "\\n");
        }

        function handleAptActionResult(res, defaultMessage) {
            if(!res || res.status === 'ok') return true;
            if(res.status === 'forbidden') {
                alert("공유 데이터 또는 다른 업체 데이터는 수정할 수 없습니다.");
                return false;
            }
            alert(defaultMessage || "처리에 실패했습니다.");
            return false;
        }

        function updateAptModeBanner(message, tone) {
            const el = document.getElementById('aptModeBanner');
            if(!el) return;
            const presets = {
                info: {
                    bg: '#eef4ff',
                    border: '#cfe0ff',
                    color: '#1f4f99'
                },
                readonly: {
                    bg: '#fff8e1',
                    border: '#ffe08a',
                    color: '#8a5a00'
                },
                writable: {
                    bg: '#edf9f0',
                    border: '#bfe8c8',
                    color: '#1d6b36'
                }
            };
            const selected = presets[tone] || presets.info;
            el.style.background = selected.bg;
            el.style.borderColor = selected.border;
            el.style.color = selected.color;
            el.innerHTML = `<i class="fas fa-circle-info"></i><span>${message}</span>`;
        }

        function updateSectionStateBadge(id, message, tone) {
            const el = document.getElementById(id);
            if(!el) return;
            el.className = 'section-state-badge';
            if(tone) el.classList.add(tone);
            el.textContent = message;
        }

        function expandSection(id) {
            const el = document.getElementById(id);
            if(!el || window.innerWidth > 768) return;
            el.classList.remove('collapsed');
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ============================================================
        // [1] 단지 (Complex) 관리
        // ============================================================
        function loadComplexes() {
            const listEl = document.getElementById('listComplex');
            fetch('/api/apt/complexes').then(r => r.json()).then(data => {
                let html = "";
                if(data.length === 0) html = '<div style="padding:20px; text-align:center; color:#999;">등록된 단지가 없습니다.</div>';
                else {
                    data.forEach(c => {
                        const isActive = (curComplexId == c.ComplexID) ? 'active' : '';
                        const readOnlyBadge = c.is_writable ? '' : '<span style="font-size:11px; color:#856404; background:#fff3cd; border:1px solid #ffe69c; border-radius:999px; padding:2px 8px; margin-left:8px;">읽기 전용</span>';
                        const actionHtml = c.is_writable ? `
                                <i class="fas fa-edit" style="color:#007bff; cursor:pointer;" onclick="editComplex(${c.ComplexID}, '${escapeJsString(c.ComplexName)}')"></i>
                                <i class="fas fa-trash" style="color:#dc3545; margin-left:5px; cursor:pointer;" onclick="delComplex(${c.ComplexID})"></i>
                        ` : '';
                        html += `
                        <div class="list-item ${isActive} ${c.is_writable ? '' : 'readonly-row'}" data-id="${c.ComplexID}" onclick="selectComplex(${c.ComplexID}, '${escapeJsString(c.ComplexName)}', ${c.is_writable ? 'true' : 'false'}, this)">
                            <div style="display:flex; align-items:center;">
                                <i class="fas fa-bars drag-handle"></i>
                                <span>${escapeHtml(c.ComplexName)}</span>
                                ${readOnlyBadge}
                            </div>
                            <div class="btn-mini-group" onclick="event.stopPropagation()">
                                ${actionHtml}
                            </div>
                        </div>`;
                    });
                }
                listEl.innerHTML = html;
            });
        }

        function saveComplex() {
            const name = document.getElementById('newComplexName').value;
            if(!name) return alert("단지명을 입력하세요");
            
            const formData = new FormData();
            formData.append('name', name);

            fetch('/api/apt/complex/save', { method:'POST', body: formData })
            .then(r => r.json()).then((res) => {
                if(!handleAptActionResult(res, "단지 저장에 실패했습니다.")) return;
                document.getElementById('newComplexName').value = "";
                loadComplexes();
            });
        }

        function editComplex(id, oldName) {
            const newName = prompt("단지명을 수정하세요:", oldName);
            if(newName && newName !== oldName) {
                const formData = new FormData();
                formData.append('id', id);
                formData.append('name', newName);
                fetch('/api/apt/complex/save', { method:'POST', body: formData })
                    .then(r => r.json())
                    .then((res) => {
                        if(!handleAptActionResult(res, "단지 수정에 실패했습니다.")) return;
                        loadComplexes();
                    });
            }
        }

        function delComplex(id) {
            if(confirm("정말 삭제하시겠습니까?\n하위 평형과 사이즈 데이터가 모두 삭제됩니다.")) {
                const formData = new FormData();
                formData.append('id', id);
                fetch('/api/apt/complex/delete', { method:'POST', body: formData }).then(r => r.json()).then((res) => {
                    if(!handleAptActionResult(res, "단지 삭제에 실패했습니다.")) return;
                    curComplexId = null; curPlanId = null;
                    document.getElementById('listPlan').innerHTML = '<div style="padding:20px; text-align:center; color:#999;">단지를 선택해주세요.</div>';
                    document.getElementById('listWindow').innerHTML = '<tr><td colspan="5" style="padding:30px; color:#999;">평형을 먼저 선택하세요.</td></tr>';
                    document.getElementById('planInputWrap').style.display = 'none';
                    document.getElementById('winFormWrap').style.display = 'none';
                    loadComplexes();
                });
            }
        }

        function selectComplex(id, name, isWritable, el) {
            curComplexId = id;
            curPlanId = null;
            document.querySelectorAll('#listComplex .list-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            // UI 업데이트
            document.getElementById('planTitle').innerText = "2. " + name + " 평형";
            document.getElementById('planInputWrap').style.display = isWritable ? 'block' : 'none';
            document.getElementById('boxPlan').classList.remove('collapsed'); // 모바일 열기
            updateSectionStateBadge('planStateBadge', isWritable ? '수정 가능' : '읽기 전용', isWritable ? 'writable' : 'readonly');
            updateSectionStateBadge('winStateBadge', '선택 대기', null);
            updateAptModeBanner(
                isWritable
                    ? `선택한 단지 "${escapeHtml(name)}"는 현재 업체에서 수정할 수 있습니다.`
                    : `선택한 단지 "${escapeHtml(name)}"는 공유 데이터입니다. 조회만 가능합니다.`,
                isWritable ? 'writable' : 'readonly'
            );
            
            // 초기화
            document.getElementById('listWindow').innerHTML = '<tr><td colspan="5" style="padding:30px; color:#999;">평형을 먼저 선택하세요.</td></tr>';
            document.getElementById('winFormWrap').style.display = 'none';
            
            loadPlans(id);
            expandSection('boxPlan');
        }

        // ============================================================
        // [2] 평형 (Plan) 관리
        // ============================================================
        function loadPlans(complexId) {
            fetch('/api/apt/plans/' + complexId).then(r => r.json()).then(data => {
                const listEl = document.getElementById('listPlan');
                let html = "";
                if(data.length === 0) html = '<div style="padding:20px; text-align:center; color:#999;">등록된 평형이 없습니다.</div>';
                else {
                    data.forEach(p => {
                        const isActive = (curPlanId == p.PlanID) ? 'active' : '';
                        const readOnlyBadge = p.is_writable ? '' : '<span style="font-size:11px; color:#856404; background:#fff3cd; border:1px solid #ffe69c; border-radius:999px; padding:2px 8px; margin-left:8px;">읽기 전용</span>';
                        const actionHtml = p.is_writable ? `
                                <i class="fas fa-edit" style="color:#007bff; cursor:pointer;" onclick="editPlan(${p.PlanID}, '${escapeJsString(p.PlanName)}')"></i>
                                <i class="fas fa-trash" style="color:#dc3545; margin-left:5px; cursor:pointer;" onclick="delPlan(${p.PlanID})"></i>
                        ` : '';
                        html += `
                        <div class="list-item ${isActive} ${p.is_writable ? '' : 'readonly-row'}" data-id="${p.PlanID}" onclick="selectPlan(${p.PlanID}, '${escapeJsString(p.PlanName)}', ${p.is_writable ? 'true' : 'false'}, this)">
                            <div style="display:flex; align-items:center;">
                                <i class="fas fa-bars drag-handle"></i>
                                <span>${escapeHtml(p.PlanName)}</span>
                                ${readOnlyBadge}
                            </div>
                            <div class="btn-mini-group" onclick="event.stopPropagation()">
                                ${actionHtml}
                            </div>
                        </div>`;
                    });
                }
                listEl.innerHTML = html;
            });
        }

        function savePlan() {
            const name = document.getElementById('newPlanName').value;
            if(!name) return alert("평형 이름을 입력하세요");
            
            const formData = new FormData();
            formData.append('complex_id', curComplexId);
            formData.append('name', name);

            fetch('/api/apt/plan/save', { method:'POST', body: formData })
            .then(r => r.json()).then((res) => {
                if(!handleAptActionResult(res, "평형 저장에 실패했습니다.")) return;
                document.getElementById('newPlanName').value = "";
                loadPlans(curComplexId);
            });
        }

        function editPlan(id, oldName) {
            const newName = prompt("평형 이름을 수정하세요:", oldName);
            if(newName && newName !== oldName) {
                const formData = new FormData();
                formData.append('complex_id', curComplexId);
                formData.append('id', id);
                formData.append('name', newName);
                fetch('/api/apt/plan/save', { method:'POST', body: formData })
                    .then(r => r.json())
                    .then((res) => {
                        if(!handleAptActionResult(res, "평형 수정에 실패했습니다.")) return;
                        loadPlans(curComplexId);
                    });
            }
        }

        function delPlan(id) {
            if(confirm("삭제하시겠습니까? 하위 창문 데이터도 삭제됩니다.")) {
                const formData = new FormData();
                formData.append('id', id);
                fetch('/api/apt/plan/delete', { method:'POST', body: formData }).then(r => r.json()).then((res) => {
                    if(!handleAptActionResult(res, "평형 삭제에 실패했습니다.")) return;
                    curPlanId = null;
                    document.getElementById('listWindow').innerHTML = '<tr><td colspan="5" style="padding:30px; color:#999;">평형을 먼저 선택하세요.</td></tr>';
                    document.getElementById('winFormWrap').style.display = 'none';
                    loadPlans(curComplexId);
                });
            }
        }

        function selectPlan(id, name, isWritable, el) {
            curPlanId = id;
            document.querySelectorAll('#listPlan .list-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');

            document.getElementById('winTitle').innerText = "3. " + name + " 실측 데이터";
            document.getElementById('winFormWrap').style.display = isWritable ? 'block' : 'none';
            resetForm(); // 입력폼 초기화
            updateSectionStateBadge('winStateBadge', isWritable ? '수정 가능' : '읽기 전용', isWritable ? 'writable' : 'readonly');
            updateAptModeBanner(
                isWritable
                    ? `선택한 평형 "${escapeHtml(name)}"는 창호 데이터를 수정할 수 있습니다.`
                    : `선택한 평형 "${escapeHtml(name)}"는 공유 데이터입니다. 창호는 조회만 가능합니다.`,
                isWritable ? 'writable' : 'readonly'
            );
            loadWindows(id);
            if (isWritable) {
                expandSection('boxPlan');
            }
        }

        // ============================================================
        // [3] 창문 (Window) 관리 - ASP 로직 구현
        // ============================================================
        function loadWindows(planId) {
            fetch('/api/apt/windows/' + planId).then(r => r.json()).then(data => {
                const tbody = document.getElementById('listWindow');
                let html = "";
                if(data.length === 0) html = "<tr><td colspan='5' style='padding:30px; color:#999;'>등록된 데이터가 없습니다.</td></tr>";
                else {
                    data.forEach(w => {
                        // ★ 분할 상세 텍스트 생성 로직
                        let splitTxt = "-";
                        
                        if(w.SplitCount && w.SplitCount > 1) {
                            // 1. DB에 저장된 상세 사이즈가 있으면 사용 ("136,173")
                            // 2. 없으면 전체 폭을 N등분해서 보여줌 ("150,150")
                            let sizes = w.SplitSizes;
                            if(!sizes) {
                                let avg = (w.Width / w.SplitCount).toFixed(1);
                                let arr = [];
                                for(let k=0; k<w.SplitCount; k++) arr.push(avg);
                                sizes = arr.join(','); // "150,150"
                            }
                            
                            // 표기 형식: (136,173) 2창
                            splitTxt = `<span style="font-weight:bold; color:#d63384;">(${sizes})</span> ${w.SplitCount}창`;
                        }

                        let memoTxt = w.Memo || "";

                        const readOnlyBadge = w.is_writable ? '' : '<span style="font-size:11px; color:#856404; background:#fff3cd; border:1px solid #ffe69c; border-radius:999px; padding:2px 8px; margin-left:8px;">읽기 전용</span>';
                        const deleteHtml = w.is_writable ? `<i class="fas fa-times" style="color:#dc3545; cursor:pointer;" onclick="delWindow(${w.WindowID})"></i>` : '';
                        html += `
                        <tr class="win-row ${w.is_writable ? '' : 'readonly-row'}" onclick="editWindow(${w.WindowID}, '${escapeJsString(w.WinType)}', '${escapeJsString(w.LocationName)}', ${w.Width}, ${w.Height}, ${w.SplitCount || 1}, '${escapeJsString(memoTxt)}', '${escapeJsString(w.SplitSizes || '')}')">
                            <td data-label="" onclick="event.stopPropagation()"><i class="fas fa-bars drag-handle"></i></td>
                            <td class="win-cell-main" data-label="위치/타입" style="text-align:left; padding-left:10px;">
                                <div class="win-main-line">
                                    <span class="win-location">${escapeHtml(w.LocationName)}</span>
                                    <span class="win-type">${escapeHtml(w.WinType || '블라인드')}</span>
                                    ${readOnlyBadge}
                                </div>
                            </td>
                            <td class="win-split" data-label="분할상세">${splitTxt}</td>
                            <td class="win-size" data-label="총사이즈">${w.Width} x ${w.Height}</td>
                            <td class="win-action" data-label="" onclick="event.stopPropagation()">
                                ${deleteHtml}
                            </td>
                        </tr>`;
                    });
                }
                tbody.innerHTML = html;
            });
        }

        function changeInputMode() {
            const type = document.getElementById("WinType").value;
            const splitSel = document.getElementById("SplitCount");
            if (type === "커튼") { 
                splitSel.value = "1";
                splitSel.disabled = true;
            } else { 
                splitSel.disabled = false;
            }
            renderSplitInputs();
        }

        function renderSplitInputs() {
            const count = parseInt(document.getElementById("SplitCount").value);
            const container = document.getElementById("dynamicInputs");
            let html = "";
            for (let i = 1; i <= count; i++) {
                if (i > 1) html += '<span style="color:#ccc; font-weight:bold; margin:0 2px;">+</span>';
                html += `<input type="number" step="0.1" id="w_sub_${i}" class="split-inp" placeholder="창${i}" oninput="calcTotalWidth()">`;
            }
            container.innerHTML = html;
        }

        function calcTotalWidth() {
            // 분할 입력값 합산 로직 (저장은 합산된 값으로)
            // Python Backend는 Width만 받으므로 여기서 합쳐야 함
        }

        function saveWindow() {
            const id = document.getElementById('inpWid').value;
            const loc = document.getElementById('LocationName').value;
            const type = document.getElementById('WinType').value;
            const h = document.getElementById('Height').value;
            const memo = document.getElementById('Memo').value;
            const splitCnt = document.getElementById('SplitCount').value;

            // 1. 분할 입력값 수집 및 합산
            let totalW = 0;
            let sizeArr = []; // 개별 사이즈 저장용 배열
            const cnt = parseInt(splitCnt);
            
            for(let i=1; i<=cnt; i++) {
                const val = parseFloat(document.getElementById(`w_sub_${i}`).value) || 0;
                totalW += val;
                sizeArr.push(val);
            }

            if(!loc || totalW === 0 || !h) return alert("위치, 가로, 세로 사이즈를 모두 입력하세요.");

            const formData = new FormData();
            formData.append('plan_id', curPlanId);
            formData.append('id', id || 0);
            formData.append('location', loc);
            formData.append('width', totalW); // 합산된 전체 가로
            formData.append('height', h);
            formData.append('win_type', type);
            formData.append('split_count', splitCnt);
            formData.append('memo', memo);
            
            // ★ 핵심: 개별 사이즈 문자열로 변환해서 전송 (예: "136,173")
            formData.append('split_sizes', sizeArr.join(',')); 

            fetch('/api/apt/window/save', { method:'POST', body: formData })
            .then(r => r.json()).then(res => {
                if(!handleAptActionResult(res, "창호 저장에 실패했습니다.")) return;
                resetForm();
                loadWindows(curPlanId);
            });
        }

        function editWindow(id, type, loc, totalW, h, splitCnt, memo, splitSizes) {
            document.getElementById("inpWid").value = id;
            document.getElementById("LocationName").value = loc;
            document.getElementById("WinType").value = type || '블라인드';
            document.getElementById("Height").value = h;
            document.getElementById("Memo").value = memo;
            document.getElementById("SplitCount").value = splitCnt;
            
            changeInputMode(); // 입력칸(input) 생성

            // 저장된 분할 사이즈가 있으면 그걸 넣고, 없으면 균등 분할
            if(splitCnt > 1) {
                if(splitSizes && splitSizes.includes(',')) {
                    // ★ 저장된 값(예: "136,173")이 있으면 쪼개서 넣기
                    let arr = splitSizes.split(',');
                    for(let i=0; i<arr.length; i++) {
                        if(document.getElementById(`w_sub_${i+1}`)) {
                            document.getElementById(`w_sub_${i+1}`).value = arr[i];
                        }
                    }
                } else {
                    // 기존 데이터 호환용 (균등 분할)
                    const subW = (totalW / splitCnt).toFixed(1);
                    for(let i=1; i<=splitCnt; i++) {
                        document.getElementById(`w_sub_${i}`).value = subW;
                    }
                }
            } else {
                document.getElementById(`w_sub_1`).value = totalW;
            }

            // 버튼 변경 UI 처리
            const btnSave = document.getElementById("btnSave");
            btnSave.innerText = "수정완료"; 
            btnSave.classList.remove('btn-save');
            btnSave.classList.add('btn-info');
            document.getElementById("btnReset").style.display = "inline-block";
            if (window.innerWidth <= 768) {
                document.getElementById('winFormWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function delWindow(id) {
            if(confirm("삭제하시겠습니까?")) {
                const formData = new FormData();
                formData.append('id', id);
                fetch('/api/apt/window/delete', { method:'POST', body: formData })
                    .then(r => r.json())
                    .then((res) => {
                        if(!handleAptActionResult(res, "창호 삭제에 실패했습니다.")) return;
                        loadWindows(curPlanId);
                    });
            }
        }

        function resetForm() {
            document.getElementById("inpWid").value = "";
            document.getElementById("LocationName").value = "";
            document.getElementById("Height").value = "";
            document.getElementById("Memo").value = "";
            document.getElementById("SplitCount").value = "1";
            changeInputMode();
            
            const btnSave = document.getElementById("btnSave");
            btnSave.innerText = "저장하기"; 
            btnSave.classList.remove('btn-info');
            btnSave.classList.add('btn-save');
            document.getElementById("btnReset").style.display = "none";
            document.querySelectorAll('.win-row').forEach(r => r.classList.remove('editing'));
        }

        function toggleSection(id) {
            if(window.innerWidth > 768) return;
            const el = document.getElementById(id);
            el.classList.toggle('collapsed');
        }

        // 드래그 정렬 (SortableJS) - UI만 구현 (백엔드 API 필요)
        function initSortable(elId, type) {
            const el = document.getElementById(elId);
            if(el) {
                new Sortable(el, {
                    animation: 150, handle: ".drag-handle",
                    onEnd: function(evt) { 
                        // console.log(type, "sorted");
                        // saveOrder(type, this.toArray()); // 백엔드 구현 시 사용
                    }
                });
            }
        }
    </script>
</body>
