function selectProduct(targetIdx, productId, prodName, supName, supplierId, cost, sellPrice) {
    pushItemMasterSearchDebug('dropdown-select', {
        screen: buildVisibleProductSearchState(targetIdx, { value: prodName }),
        chosen: {
            productId,
            product: prodName,
            supplier: supName,
            cost,
            price: sellPrice
        }
    });
    let targetInp = targetIdx === 'Master' ? document.getElementById('Master_Prod') : document.getElementById(`ProdName_${targetIdx}`) || document.querySelector(`input[name="ProdName_${targetIdx}"]`);
    if (targetInp) {
        targetInp.value = prodName;
        targetInp.dataset.productId = String(productId || "");
    }
    let pidEl = targetIdx === 'Master' ? document.getElementById('Master_ProductID') : document.querySelector(`input[name="ProductMasterID_${targetIdx}"]`);
    if (pidEl) pidEl.value = String(productId || "");
    if (targetIdx === 'Master') {
        document.querySelectorAll('.sync-pid').forEach(el => { el.value = String(productId || ""); });
        document.querySelectorAll('.sync-supplier-id').forEach(el => { el.value = String(Number(supplierId || 0) || ""); });
    }
    if (productId && typeof window.primeProductAttrCache === 'function') {
        window.primeProductAttrCache(productId);
    }

    let supEl = targetIdx === 'Master' ? document.getElementById('Master_Supplier') : document.getElementById(`Supplier_${targetIdx}`);
    let supIdEl = targetIdx === 'Master' ? document.getElementById('Master_SupplierID') : document.querySelector(`input[name="SupplierID_${targetIdx}"]`);
    let costEl = targetIdx === 'Master' ? document.getElementById('Master_CostPrice') : document.getElementById(`CostPrice_${targetIdx}`);
    let priceEl = targetIdx === 'Master' ? document.getElementById('Master_Price') : document.getElementById(`Price_${targetIdx}`);
    
    if(supEl) {
        supEl.value = supName || '';
        if (supEl.dataset) supEl.dataset.supplierId = String(Number(supplierId || 0) || '');
    }
    if (supIdEl) supIdEl.value = String(Number(supplierId || 0) || '');
    if(costEl) {
        costEl.value = formatComma(cost);
        costEl.classList.add('pulse-highlight');
        setTimeout(() => costEl.classList.remove('pulse-highlight'), 2000);
    }
    
    if(priceEl && sellPrice > 0) {
        priceEl.value = formatComma(sellPrice);
        priceEl.dispatchEvent(new Event('input'));
    }

    // 아이콘 스위칭 (수정 모드)
    let actionIcon = document.getElementById(`ActionIcon_${targetIdx}`);
    if(actionIcon) {
        actionIcon.className = 'fas fa-edit text-warning';
        actionIcon.title = '기존 단가 수정';
    }
    
    if (targetIdx === 'Master') {
        const count = document.querySelectorAll('input[name="RowIdx"]').length;
        if(typeof syncBlindData === 'function') syncBlindData(count, 'ProdName');
    }
    
    smartDropdown.style.display = 'none';
    
    // 값 채워진 직후 바로 툴팁 렌더링
    if(priceEl) autoShowMargin(targetIdx, priceEl);
}

// 💡 [클라우드 업로드] 마스터 DB에 단가/원가 명시적 동기화
window.uploadMasterPrice = async function(idx) {
    if (typeof window.__viewUiUploadMasterPrice === 'function') {
        return window.__viewUiUploadMasterPrice(idx);
    }
};

// [UX 최적화] 마진율 자동 표시 (Debouncing)
let marginTimer = {};
window.autoShowMargin = function(idx, el) {
    clearTimeout(marginTimer[idx]);
    marginTimer[idx] = setTimeout(() => {
        const price = safeCleanNum(el.value);
        let cost = 0;
        if (idx === 'Master') {
            cost = safeCleanNum(document.getElementById('Master_CostPrice')?.value);
            if (price > 0 && cost > 0) triggerBlindMarginPopup(document.getElementById('MasterPriceWrapper'));
        } else {
            cost = safeCleanNum(document.getElementById(`CostPrice_${idx}`)?.value);
            if (price > 0 && cost > 0) triggerMarginPopup(document.getElementById(`PriceWrapper_${idx}`), idx);
        }
    }, 400); // 0.4초간 추가 입력이 없으면 렌더링
};

window.triggerMarginPopup = function(el, idx) {
    const priceStr = document.getElementById(`Price_${idx}`)?.value || document.querySelector(`input[name="Price_${idx}"]`)?.value;
    const qtyStr = document.getElementById(`Qty_${idx}`)?.value || document.querySelector(`input[name="Qty_${idx}"]`)?.value;
    
    const price = safeCleanNum(priceStr);
    let qty = safeCleanNum(qtyStr);
    if (qty === 0) qty = 1; 
    
    const rev = price * qty; 
    const costPrice = safeCleanNum(document.getElementById(`CostPrice_${idx}`)?.value);
    const cost = costPrice * qty; 
    
    const targetEl = document.getElementById(`PriceWrapper_${idx}`) || el;
    showRealMarginPopup(targetEl, rev, cost);
};

window.triggerBlindMarginPopup = function(el) {
    const price = safeCleanNum(document.getElementById('Master_Price')?.value);
    let totalQty = safeCleanNum(document.getElementById('TotalBlindQty')?.value);
    if (totalQty === 0) totalQty = 1; 
    
    const rev = price * totalQty;
    const costPrice = safeCleanNum(document.getElementById('Master_CostPrice')?.value);
    const cost = costPrice * totalQty;
    
    const targetEl = document.getElementById('MasterPriceWrapper') || el;
    showRealMarginPopup(targetEl, rev, cost);
};

function showRealMarginPopup(element, rev, cost) {
    const existing = document.getElementById('realMarginBubble');
    if(existing) existing.remove();

    const profit = rev - cost;
    const marginRate = rev > 0 ? ((profit / rev) * 100).toFixed(1) : 0;
    const colorCode = profit >= 0 ? '#fcc419' : '#fa5252'; 
    
    const bubble = document.createElement('div');
    bubble.id = 'realMarginBubble';
    bubble.innerHTML = `
        <div style="font-size:11px; color:#adb5bd; margin-bottom:2px; font-weight:normal;">매입원가 차감 순이익</div>
        <div style="font-size:16px; font-weight:900; color:${colorCode};">${formatComma(profit)}원 <span style="font-size:12px; font-weight:bold; opacity:0.9;">(${marginRate}%)</span></div>
    `;
    bubble.style.cssText = "position:absolute; background:#212529; padding:8px 12px; border-radius:10px; z-index:99999; box-shadow:0 8px 24px rgba(0,0,0,0.3); bottom:calc(100% + 8px); right:0; white-space:nowrap; text-align:right;";
    
    element.style.position = "relative";
    element.appendChild(bubble);
    setTimeout(() => { if(bubble) bubble.remove(); }, 3000);
}
</script>
