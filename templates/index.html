<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커튼/블라인드 주문 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; }
        .table th { background-color: #e9ecef; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4 text-primary">�� 주문 관리 대시보드</h2>
        
        <div class="card p-4">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>고객명</th>
                        <th>주문코드</th>
                        <th>총 금액</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="order-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // API 서버에서 데이터 가져오기
        async function fetchOrders() {
            try {
                const response = await fetch('/orders'); // FastAPI에 요청
                const orders = await response.json();
                
                const tableBody = document.getElementById('order-list');
                tableBody.innerHTML = ''; // 기존 내용 비우기

                orders.forEach(order => {
                    const row = `
                        <tr>
                            <td>${order.OrderID}</td>
                            <td><strong>${order.CustomerName}</strong></td>
                            <td><span class="badge bg-secondary">${order.Order_code}</span></td>
                            <td>${Number(order.TotalAmount).toLocaleString()}원</td>
                            <td><span class="badge bg-success">계약완료</span></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error:', error);
                alert('데이터를 불러오는데 실패했습니다.');
            }
        }

        // 페이지 로딩 시 실행
        fetchOrders();
    </script>
</body>
</html>
